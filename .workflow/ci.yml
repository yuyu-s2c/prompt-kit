version: '1.0'
name: prompt-kit-ci
displayName: prompt-kit CI
triggers:
  push:
    branches:
      precise:
        - main
  pr:
    branches:
      precise:
        - main
stages:
  - stage: test_and_build
    displayName: 测试与构建
    strategy: naturally
    trigger: auto
    steps:
      - step: build@nodejs
        name: nodejs_test_build
        displayName: Node.js 测试与构建
        nodeVersion: '20.14.0'
        commands:
          - npm ci
          - npm run typecheck
          - npm run lint
          - npm run format:check
          - npm test
          - npm run build
        artifacts:
          - name: DIST
            path:
              - ./dist
        caches:
          - ~/.npm
