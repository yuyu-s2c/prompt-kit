version: '1.0'
name: prompt-kit-publish
displayName: prompt-kit 发布
triggers:
  push:
    tags:
      prefix:
        - v
variables:
  NPM_TOKEN: ''
stages:
  - stage: publish
    displayName: 发布到 npm
    strategy: naturally
    trigger: auto
    steps:
      - step: build@nodejs
        name: nodejs_publish
        displayName: 发布到 npm
        nodeVersion: '20.14.0'
        commands:
          - npm ci
          - npm run build
          - echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
          - npm publish --access public
        caches:
          - ~/.npm
